<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Neumorphism</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #e8ecf0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .register-container { width: 100%; max-width: 420px; }

  .register-card {
    background: #e8ecf0;
    border-radius: 28px;
    padding: 2.5rem 2rem;
    box-shadow: 10px 10px 24px #c5cad2, -10px -10px 24px #ffffff;
  }

  .register-header { text-align: center; margin-bottom: 2rem; }

  .neu-icon {
    width: 72px; height: 72px;
    background: #e8ecf0;
    border-radius: 50%;
    box-shadow: 6px 6px 14px #c5cad2, -6px -6px 14px #ffffff;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1rem;
  }

  .neu-icon svg { width: 30px; height: 30px; color: #6366f1; }

  .register-header h2 { font-size: 1.5rem; font-weight: 700; color: #3d4452; margin-bottom: 0.3rem; }
  .register-header p { font-size: 0.875rem; color: #8a94a6; }

  .form-group { margin-bottom: 1.1rem; }

  .neu-input {
    position: relative;
    border-radius: 14px;
    background: #e8ecf0;
    box-shadow: inset 5px 5px 10px #c5cad2, inset -5px -5px 10px #ffffff;
  }

  .neu-input input {
    width: 100%;
    background: transparent;
    border: none; outline: none;
    padding: 1rem 1rem 0.5rem 2.8rem;
    font-size: 0.875rem;
    font-family: 'Nunito', sans-serif;
    color: #3d4452;
    border-radius: 14px;
    height: 56px;
    transition: all 0.2s;
  }

  .neu-input input::placeholder { color: transparent; }

  .neu-input label {
    position: absolute;
    left: 2.8rem; top: 50%;
    transform: translateY(-50%);
    font-size: 0.875rem; color: #8a94a6;
    pointer-events: none;
    transition: all 0.2s ease;
  }

  .neu-input input:focus ~ label,
  .neu-input input:not(:placeholder-shown) ~ label {
    top: 12px; font-size: 0.7rem; color: #6366f1;
  }

  .input-icon {
    position: absolute; left: 0.9rem; top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .input-icon svg { width: 16px; height: 16px; color: #8a94a6; display: block; }

  .password-group .pass-toggle {
    position: absolute; right: 0.75rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    padding: 4px; color: #8a94a6;
    display: flex; align-items: center;
  }

  .eye-closed { display: none; }

  .password-strength { margin-top: 0.5rem; padding: 0 0.25rem; }

  .strength-bar { display: flex; gap: 4px; margin-bottom: 4px; }

  .strength-segment {
    flex: 1; height: 3px; border-radius: 2px;
    background: #d1d5db; transition: background 0.3s;
  }

  .strength-text { font-size: 0.72rem; color: #8a94a6; transition: color 0.3s; }

  .terms-row {
    display: flex; align-items: flex-start;
    gap: 0.75rem; margin: 1.25rem 0;
  }

  .neu-checkbox-wrap { position: relative; flex-shrink: 0; }

  .neu-checkbox-wrap input[type="checkbox"] {
    opacity: 0; position: absolute;
    width: 22px; height: 22px;
    cursor: pointer; z-index: 1;
  }

  .neu-checkbox {
    width: 22px; height: 22px; border-radius: 7px;
    background: #e8ecf0;
    box-shadow: 3px 3px 7px #c5cad2, -3px -3px 7px #ffffff;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .neu-checkbox svg { width: 12px; height: 12px; stroke: #6366f1; opacity: 0; transition: opacity 0.2s; }

  .neu-checkbox-wrap input:checked ~ .neu-checkbox {
    box-shadow: inset 3px 3px 6px #c5cad2, inset -3px -3px 6px #ffffff;
  }

  .neu-checkbox-wrap input:checked ~ .neu-checkbox svg { opacity: 1; }

  .terms-row label { font-size: 0.8rem; color: #6b7280; line-height: 1.5; cursor: pointer; }
  .terms-row label a { color: #6366f1; text-decoration: none; font-weight: 600; }

  .message-box {
    text-align: center;
    font-size: 0.82rem;
    min-height: 1.2rem;
    margin-bottom: 0.75rem;
    color: #ef4444;
    font-weight: 600;
  }

  .message-box.success { color: #22c55e; }

  .neu-btn {
    width: 100%; padding: 1rem;
    background: linear-gradient(135deg, #6366f1, #818cf8);
    border: none; border-radius: 14px;
    color: #fff; font-size: 0.95rem;
    font-family: 'Nunito', sans-serif;
    font-weight: 700; letter-spacing: 0.5px;
    cursor: pointer;
    box-shadow: 5px 5px 12px #c5cad2, -3px -3px 10px #ffffff, 0 4px 15px rgba(99,102,241,0.35);
    transition: all 0.2s;
  }

  .neu-btn:hover {
    box-shadow: 7px 7px 16px #c5cad2, -4px -4px 12px #ffffff, 0 6px 20px rgba(99,102,241,0.45);
    transform: translateY(-1px);
  }

  .neu-btn:active {
    transform: translateY(0);
    box-shadow: 3px 3px 8px #c5cad2, -2px -2px 6px #ffffff, 0 2px 8px rgba(99,102,241,0.25);
  }

  .neu-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  .divider {
    display: flex; align-items: center;
    gap: 0.75rem; margin: 1.5rem 0;
  }

  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, #c5cad2); }
  .divider-line:last-child { background: linear-gradient(to left, transparent, #c5cad2); }
  .divider span { font-size: 0.78rem; color: #8a94a6; white-space: nowrap; }

  .social-row { display: flex; justify-content: center; gap: 1rem; margin-bottom: 1.5rem; }

  .social-btn {
    width: 52px; height: 52px; border: none; border-radius: 14px;
    background: #e8ecf0;
    box-shadow: 4px 4px 10px #c5cad2, -4px -4px 10px #ffffff;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; color: #3d4452;
  }

  .social-btn:hover {
    box-shadow: 6px 6px 14px #c5cad2, -6px -6px 14px #ffffff;
    transform: translateY(-2px);
  }

  .social-btn:active {
    box-shadow: inset 3px 3px 7px #c5cad2, inset -3px -3px 7px #ffffff;
    transform: translateY(0);
  }

  .social-btn svg { width: 20px; height: 20px; }

  .login-link { text-align: center; font-size: 0.85rem; color: #8a94a6; }
  .login-link a { color: #6366f1; font-weight: 700; text-decoration: none; }

  .error-msg {
    font-size: 0.72rem; color: #ef4444;
    margin-top: 5px; padding-left: 0.5rem; display: none;
  }

  .neu-input.error {
    box-shadow: inset 5px 5px 10px #fca5a5, inset -5px -5px 10px #fff5f5;
  }
</style>
</head>
<body>

<div class="register-container">
  <div class="register-card">

    <div class="register-header">
      <div class="neu-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <line x1="19" y1="8" x2="19" y2="14"/>
          <line x1="22" y1="11" x2="16" y2="11"/>
        </svg>
      </div>
      <h2>Buat akun baru</h2>
      <p>Daftar untuk mulai menggunakan layanan</p>
    </div>

    <form id="registerForm" novalidate>

      <!-- Username -->
      <div class="form-group">
        <div class="neu-input" id="wrapUsername">
          <input type="text" id="username" placeholder=" " required autocomplete="username">
          <label for="username">Username</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>
        <span class="error-msg" id="errUsername">Username wajib diisi</span>
      </div>

      <!-- Email -->
      <div class="form-group">
        <div class="neu-input" id="wrapEmail">
          <input type="email" id="email" placeholder=" " required autocomplete="email">
          <label for="email">Alamat email</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
          </div>
        </div>
        <span class="error-msg" id="errEmail">Masukkan email yang valid</span>
      </div>

      <!-- Password -->
      <div class="form-group">
        <div class="neu-input password-group" id="wrapPassword">
          <input type="password" id="password" placeholder=" " required autocomplete="new-password">
          <label for="password">Kata sandi</label>
          <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
          </div>
          <button type="button" class="pass-toggle" id="togglePass" aria-label="Tampilkan/sembunyikan kata sandi">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="password-strength">
          <div class="strength-bar">
            <div class="strength-segment" id="seg1"></div>
            <div class="strength-segment" id="seg2"></div>
            <div class="strength-segment" id="seg3"></div>
            <div class="strength-segment" id="seg4"></div>
          </div>
          <span class="strength-text" id="strengthText">Masukkan kata sandi</span>
        </div>
        <span class="error-msg" id="errPassword">Minimal 8 karakter</span>
      </div>

      <!-- Terms -->
      <div class="terms-row">
        <div class="neu-checkbox-wrap">
          <input type="checkbox" id="agreeTerms">
          <div class="neu-checkbox">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </div>
        </div>
        <label for="agreeTerms">Saya menyetujui <a href="#">Syarat &amp; Ketentuan</a> dan <a href="#">Kebijakan Privasi</a></label>
      </div>

      <!-- Pesan sukses/gagal -->
      <p class="message-box" id="message"></p>

      <button type="submit" class="neu-btn" id="submitBtn">Buat Akun</button>
    </form>

    <div class="divider">
      <div class="divider-line"></div>
      <span>atau daftar dengan</span>
      <div class="divider-line"></div>
    </div>

    <div class="social-row">
      <button type="button" class="social-btn" aria-label="Google">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
      </button>
      <button type="button" class="social-btn" aria-label="GitHub">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
        </svg>
      </button>
      <button type="button" class="social-btn" aria-label="Twitter/X">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </button>
    </div>

    <div class="login-link">
      <p>Sudah punya akun? <a href="index.html">Masuk di sini</a></p>
    </div>

  </div>
</div>

<script>
  // Toggle password
  const togglePass = document.getElementById('togglePass');
  const passInput = document.getElementById('password');
  const eyeOpen = togglePass.querySelector('.eye-open');
  const eyeClosed = togglePass.querySelector('.eye-closed');

  togglePass.addEventListener('click', () => {
    const isPass = passInput.type === 'password';
    passInput.type = isPass ? 'text' : 'password';
    eyeOpen.style.display = isPass ? 'none' : 'block';
    eyeClosed.style.display = isPass ? 'block' : 'none';
  });

  // Password strength
  const strengthColors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
  const strengthLabels = ['Sangat lemah', 'Lemah', 'Cukup kuat', 'Kuat'];

  function calcStrength(pw) {
    let score = 0;
    if (pw.length >= 8) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return score;
  }

  passInput.addEventListener('input', () => {
    const pw = passInput.value;
    const score = pw.length === 0 ? 0 : calcStrength(pw);
    const segs = ['seg1','seg2','seg3','seg4'].map(id => document.getElementById(id));
    const strengthText = document.getElementById('strengthText');
    segs.forEach((seg, i) => {
      seg.style.background = i < score ? strengthColors[score - 1] : '#d1d5db';
    });
    strengthText.textContent = pw.length === 0 ? 'Masukkan kata sandi' : strengthLabels[score - 1];
    strengthText.style.color = pw.length === 0 ? '#8a94a6' : strengthColors[score - 1];
  });
</script>

<!-- Register JS -->
<script src="register.js"></script>

</body>
</html>
